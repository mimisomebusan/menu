<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light only">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MIMISOME BUSAN Treatment Menu</title>
<meta name="description" content="MIMISOME BUSAN Clinic Busan - Browse our treatment menu in your language">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --orange:#D9620A;
  --dark:#2C2824;
  --mid:#8A7E74;
  --light:#B8ADA3;
  --cream:#FAF6F1;
  --warm-white:#FEFCF9;
}
html,body{color-scheme:light only;height:100%;overflow:hidden;}
body{color-scheme:light only;
  font-family:'Noto Sans',sans-serif;
  background:var(--cream);
  display:flex;align-items:center;justify-content:center;
  position:relative;
}

/* 배경 광채 */
.bg-glow{
  position:fixed;top:0;left:0;right:0;bottom:0;
  pointer-events:none;z-index:0;overflow:hidden;
}
.bg-glow::before{
  content:'';position:absolute;
  bottom:-20%;left:50%;transform:translateX(-50%);
  width:600px;height:400px;
  background:radial-gradient(ellipse,rgba(244,123,32,0.05) 0%,transparent 70%);
  animation:glowPulse 6s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{opacity:0.6;transform:translateX(-50%) scale(1);}
  50%{opacity:1;transform:translateX(-50%) scale(1.1);}
}

/* 하단 빛 반사 */
.light-reflect{
  position:fixed;bottom:0;left:0;right:0;height:35%;
  background:linear-gradient(to top,rgba(255,252,248,0.9),transparent);
  pointer-events:none;z-index:0;
}

.container{
  position:relative;z-index:1;
  max-width:400px;width:100%;
  text-align:center;padding:0 24px;
  animation:pageIn 1.2s cubic-bezier(0.25,0.46,0.45,0.94) both;
}
@keyframes pageIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* 로고 마크 */
.logo-mark{
  width:56px;height:56px;border-radius:50%;
  background:var(--warm-white);
  border:1px solid rgba(217,98,10,0.1);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  box-shadow:0 2px 20px rgba(217,98,10,0.06);
}
.logo-mark span{
  font-family:'Cormorant Garamond',serif;
  font-size:24px;font-weight:400;font-style:italic;
  color:var(--dark);
}

.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:26px;font-weight:300;
  letter-spacing:12px;color:var(--dark);
  margin-bottom:12px;
  white-space:nowrap;
}
.logo-sub{
  font-size:9px;letter-spacing:6px;
  color:var(--light);text-transform:uppercase;
  margin-bottom:48px;
}

/* 언어 리스트 */
.lang-list{
  display:flex;flex-direction:column;
  align-items:center;gap:0;
}
.lang-item{
  position:relative;
  padding:16px 32px;
  cursor:pointer;text-decoration:none;
  display:block;
  transition:all 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
  border-radius:16px;width:100%;
}
.lang-item::before{
  content:'';position:absolute;inset:0;
  border-radius:16px;
  background:linear-gradient(135deg,rgba(255,255,255,0.9),rgba(255,248,240,0.95));
  border:1px solid rgba(217,98,10,0.08);
  box-shadow:0 4px 30px rgba(244,123,32,0.0);
  opacity:0;
  transition:all 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
}
.lang-item::after{
  content:'';position:absolute;
  bottom:8px;left:50%;transform:translateX(-50%);
  width:3px;height:3px;border-radius:50%;
  background:var(--orange);opacity:0;
  transition:all 0.4s ease;
}
.lang-item:hover::before,
.lang-item:active::before{
  opacity:1;
  box-shadow:0 8px 40px rgba(244,123,32,0.08);
}
.lang-item:hover::after,
.lang-item:active::after{opacity:1;}

.lang-name{
  position:relative;z-index:1;
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:400;
  color:var(--mid);letter-spacing:2px;
  transition:all 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
  display:block;
}
.lang-item:hover .lang-name,
.lang-item:active .lang-name{
  color:var(--dark);font-size:24px;letter-spacing:3px;
}

/* 순차 등장 */
.lang-item:nth-child(1){animation:itemIn 0.8s 0.3s cubic-bezier(0.25,0.46,0.45,0.94) both;}
.lang-item:nth-child(2){animation:itemIn 0.8s 0.42s cubic-bezier(0.25,0.46,0.45,0.94) both;}
.lang-item:nth-child(3){animation:itemIn 0.8s 0.54s cubic-bezier(0.25,0.46,0.45,0.94) both;}
.lang-item:nth-child(4){animation:itemIn 0.8s 0.66s cubic-bezier(0.25,0.46,0.45,0.94) both;}
.lang-item:nth-child(5){animation:itemIn 0.8s 0.78s cubic-bezier(0.25,0.46,0.45,0.94) both;}
@keyframes itemIn{
  from{opacity:0;transform:translateY(12px);}
  to{opacity:1;transform:translateY(0);}
}

/* 선택 시 */
.lang-item.selected::before{
  opacity:1;
  box-shadow:0 0 60px rgba(244,123,32,0.15);
  background:linear-gradient(135deg,rgba(255,252,248,1),rgba(255,245,235,1));
}
.lang-item.selected .lang-name{color:var(--dark);font-size:26px;}
.lang-item.selected::after{opacity:1;width:5px;height:5px;}

.container.leaving{
  animation:pageOut 0.6s cubic-bezier(0.55,0.085,0.68,0.53) forwards;
}
@keyframes pageOut{
  to{opacity:0;transform:translateY(-16px);}
}

.footer{
  position:fixed;bottom:24px;left:0;right:0;
  text-align:center;z-index:1;
  font-size:8px;letter-spacing:3px;
  color:var(--light);text-transform:uppercase;
  animation:itemIn 0.8s 1s cubic-bezier(0.25,0.46,0.45,0.94) both;
}

@media(hover:none){
  .lang-item:active::before{opacity:1;box-shadow:0 8px 40px rgba(244,123,32,0.08);}
  .lang-item:active::after{opacity:1;}
  .lang-item:active .lang-name{color:var(--dark);font-size:24px;letter-spacing:3px;}
}
@media(max-width:380px){
  .logo{font-size:22px;letter-spacing:8px;}
  .lang-name{font-size:18px;}
  .lang-item:hover .lang-name,.lang-item:active .lang-name{font-size:22px;}
}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="light-reflect"></div>

<div class="container" id="container">
  <div class="logo-mark"><span>M</span></div>
  <div class="logo">MIMISOME BUSAN</div>
  <div class="logo-sub">Dermatology · Plastic Surgery</div>
  
  <div class="lang-list">
    <a class="lang-item" href="https://mimisomebusan.github.io/kr/" onclick="go(event,this)">
      <span class="lang-name">한국어</span>
    </a>
    <a class="lang-item" href="https://mimisomebusan.github.io/en/" onclick="go(event,this)">
      <span class="lang-name">English</span>
    </a>
    <a class="lang-item" href="https://mimisomebusan.github.io/jp/" onclick="go(event,this)">
      <span class="lang-name">日本語</span>
    </a>
    <a class="lang-item" href="https://mimisomebusan.github.io/cn/" onclick="go(event,this)">
      <span class="lang-name">中文（简体）</span>
    </a>
    <a class="lang-item" href="https://mimisomebusan.github.io/tw/" onclick="go(event,this)">
      <span class="lang-name">繁體中文</span>
    </a>
  </div>
</div>

<div class="footer">© Mimisome Clinic Busan Deokcheon</div>

<script>
function go(e, el){
  e.preventDefault();
  var url = el.getAttribute('href');
  el.classList.add('selected');
  document.querySelectorAll('.lang-item').forEach(function(item){
    if(item !== el) item.style.opacity = '0.3';
  });
  setTimeout(function(){
    document.getElementById('container').classList.add('leaving');
  }, 300);
  setTimeout(function(){
    window.location.href = url;
  }, 700);
}
</script>

</body>
</html>
